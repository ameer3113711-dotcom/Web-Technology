<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Room Editor</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: Arial; }
        /* Left UI */
        #ui { position: absolute; top: 10px; left: 10px; width: 220px; background: #000; color: white; padding: 10px; max-height: 95vh; overflow-y: auto; z-index: 1000; }
        /* Right Sidebar List */
        #objectList { position: absolute; top: 10px; right: 10px; width: 160px; background: #000; color: white; padding: 10px; max-height: 90vh; overflow-y: auto; z-index: 1000; border: 1px solid #444; }
        
        button { width: 100%; margin: 3px 0; padding: 6px; background: #222; color: white; border: none; cursor: pointer; }
        button:hover { background: #444; }
        .menu-title { margin-top: 10px; font-size: 14px; color: #aaa; }
        
        #trash { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 100px; background: rgba(255,0,0,0.3); border: 2px dashed red; color: white; text-align: center; line-height: 100px; pointer-events: auto; z-index: 500; }
        #rotation-bar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 300px; }
        input { width: 100%; }
        #sizeInfo { background: #111; padding: 5px; margin-top: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div id="ui">
    <div class="menu-title">Models</div>
    <div id="modelButtons"></div>

    <div class="menu-title">Resize & Rotate</div>
    <input type="range" id="scaleSlider" min="0.2" max="3" step="0.1" value="1">
    <input type="range" id="rotateY" min="0" max="6.28" step="0.01">

    <div class="menu-title">Object Info</div>
    <div id="sizeInfo">Select an object...</div>

    <div class="menu-title">Room Settings</div>
    Color: <input type="color" id="roomColor" value="#cc8888">
    Width <input type="range" id="roomW" min="2" max="10" step="0.5" value="4">
    Length <input type="range" id="roomL" min="2" max="10" step="0.5" value="4">
    Height <input type="range" id="roomH" min="2" max="10" step="0.5" value="3">

    <div class="menu-title">Manual Move</div>
    <button onclick="move('left')">⬅ Left</button>
    <button onclick="move('right')">➡ Right</button>
    <button onclick="move('front')">⬆ Front</button>
    <button onclick="move('back')">⬇ Back</button>
    <button onclick="move('up')">⬆ Up</button>
    <button onclick="move('down')">⬇ Down</button>
</div>

<div id="objectList">
    <div class="menu-title">Room Items</div>
    <div id="listItems"></div>
    <button onclick="deleteObj()" style="background: #800; margin-top:10px;">🗑 Delete Selected</button>
</div>

<div id="trash">🗑 DROP HERE</div>

<div id="rotation-bar">
    <input type="range" id="camRotate" min="-3.14" max="3.14" step="0.01" value="0.7">
    <input type="range" id="camY" min="1" max="10" step="0.1" value="6">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
const models = {
    bed: "models/bed.glb",
    lamp: "models/lamp.glb",
    table: "models/table.glb",
    tv: "models/tv.glb"
};
let scene, camera, renderer, raycaster, mouse;
let selected = null;
let selectionHelper = null;
let objects = [];
let isDragging = false;
const loader = new THREE.GLTFLoader();
let room, roomWidth = 4, roomLength = 4, roomHeight = 3, roomColor = 0xcc8888;

init();
animate();

function init(){
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);
    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(6, 6, 6);

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light);

    room = new THREE.Group();
    scene.add(room);
    updateRoom();

    const container = document.getElementById("modelButtons");
    Object.keys(models).forEach(name => {
        let btn = document.createElement("button");
        btn.innerText = name.toUpperCase();
        btn.onclick = () => addModel(name);
        container.appendChild(btn);
    });

    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();

    window.addEventListener("mousedown", pick);
    window.addEventListener("mousemove", drag);
    window.addEventListener("mouseup", drop);

    document.getElementById("roomColor").addEventListener("input", e => { roomColor = parseInt(e.target.value.replace("#", "0x"), 16); updateRoom(); });
    document.getElementById("scaleSlider").addEventListener("input", e => { if(selected) { let s = parseFloat(e.target.value); selected.scale.set(s,s,s); } });
    document.getElementById("rotateY").addEventListener("input", e => { if(selected) selected.rotation.y = parseFloat(e.target.value); });
    document.getElementById("roomW").addEventListener("input", e => { roomWidth = parseFloat(e.target.value); updateRoom(); });
    document.getElementById("roomL").addEventListener("input", e => { roomLength = parseFloat(e.target.value); updateRoom(); });
    document.getElementById("roomH").addEventListener("input", e => { roomHeight = parseFloat(e.target.value); updateRoom(); });
}

// Fixed Room Logic
function updateRoom(){
    room.clear();
    const mat = new THREE.MeshStandardMaterial({color: roomColor, side: THREE.DoubleSide});
    
    // Floor
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomLength), mat);
    floor.rotation.x = -Math.PI/2;
    room.add(floor);

    // 3 Walls
    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomHeight), mat);
    backWall.position.set(0, roomHeight/2, -roomLength/2);
    room.add(backWall);

    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(roomLength, roomHeight), mat);
    leftWall.position.set(-roomWidth/2, roomHeight/2, 0);
    leftWall.rotation.y = Math.PI/2;
    room.add(leftWall);

    const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(roomLength, roomHeight), mat);
    rightWall.position.set(roomWidth/2, roomHeight/2, 0);
    rightWall.rotation.y = -Math.PI/2;
    room.add(rightWall);
    
    // Add existing objects back
    objects.forEach(obj => room.add(obj));
}

function updateObjectList() {
    const listDiv = document.getElementById("listItems");
    listDiv.innerHTML = "";
    objects.forEach((obj, index) => {
        let btn = document.createElement("button");
        btn.innerText = obj.userData.modelName + " #" + (index + 1);
        btn.onclick = () => setSelected(obj);
        listDiv.appendChild(btn);
    });
}

function addModel(type){
    loader.load(models[type], (gltf) => {
        const obj = gltf.scene;
        obj.userData.modelName = type;
        obj.name = "furniture_root";
        room.add(obj);
        objects.push(obj);
        setSelected(obj);
        updateObjectList();
    });
}

function setSelected(obj){
    if(selectionHelper) scene.remove(selectionHelper);
    selected = obj;
    selectionHelper = new THREE.BoxHelper(selected, 0x00ff00);
    scene.add(selectionHelper);
    document.getElementById("sizeInfo").innerText = "Selected: " + obj.userData.modelName;
}

function pick(e){
    if(e.target.closest('#ui') || e.target.closest('#objectList')) return;
    mouse.x = (e.clientX/innerWidth)*2-1;
    mouse.y = -(e.clientY/innerHeight)*2+1;
    raycaster.setFromCamera(mouse,camera);
    const hits = raycaster.intersectObjects(objects, true);
    if(hits.length > 0){
        let root = hits[0].object;
        while(root && root.name !== "furniture_root") root = root.parent;
        if(root) { setSelected(root); isDragging = true; }
    } else {
        if(selected) { scene.remove(selectionHelper); selected = null; document.getElementById("sizeInfo").innerText = "Select an object..."; }
        isDragging = false;
    }
}

function drag(e){
    if(!selected || !isDragging) return;
    mouse.x = (e.clientX/innerWidth)*2-1;
    mouse.y = -(e.clientY/innerHeight)*2+1;
    raycaster.setFromCamera(mouse,camera);
    const plane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
    const p = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, p);
    selected.position.x = Math.max(-roomWidth/2+0.1, Math.min(roomWidth/2-0.1, p.x));
    selected.position.z = Math.max(-roomLength/2+0.1, Math.min(roomLength/2-0.1, p.z));
    if(selectionHelper) selectionHelper.update();
}

function drop(e){
    isDragging = false;
    const trash = document.getElementById("trash").getBoundingClientRect();
    if(e.clientX > trash.left && e.clientX < trash.right && e.clientY > trash.top && e.clientY < trash.bottom){
        deleteObj();
    }
}

function deleteObj(){
    if(!selected) return;
    room.remove(selected);
    scene.remove(selectionHelper);
    objects = objects.filter(o => o !== selected);
    selected = null;
    document.getElementById("sizeInfo").innerText = "Select an object...";
    updateObjectList();
}

function move(dir){
    if(!selected) return;
    const step = 0.25;
    if(dir === "up") selected.position.y += step;
    if(dir === "down") selected.position.y = Math.max(0, selected.position.y - step);
    if(dir === "left") selected.position.x -= step;
    if(dir === "right") selected.position.x += step;
    if(dir === "front") selected.position.z -= step;
    if(dir === "back") selected.position.z += step;
    if(selectionHelper) selectionHelper.update();
}

function animate(){
    requestAnimationFrame(animate);
    let rot = document.getElementById("camRotate").value;
    let height = document.getElementById("camY").value;
    camera.position.x = Math.sin(rot) * 6;
    camera.position.z = Math.cos(rot) * 6;
    camera.position.y = height;
    camera.lookAt(0,0,0);
    
    // Size reporting logic added back
    if(selected){
        const box = new THREE.Box3().setFromObject(selected);
        const size = new THREE.Vector3();
        box.getSize(size);
        document.getElementById("sizeInfo").innerText = `W:${size.x.toFixed(1)} H:${size.y.toFixed(1)} D:${size.z.toFixed(1)}`;
    }
    
    renderer.render(scene,camera);
}
</script>
</body>
</html>
